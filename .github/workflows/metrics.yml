name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: DevXtechnic
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Asia/Kathmandu
          
          # Languages
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          
          # WakaTime (Detailed) - Only if token is available
          plugin_wakatime: ${{ secrets.WAKATIME_TOKEN != '' }}
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 365
          plugin_wakatime_sections: time, languages, languages-graphs, editors, os, projects, projects-graphs
          plugin_wakatime_limit: 5
          plugin_wakatime_url: https://wakatime.com
          plugin_wakatime_user: current
          
          # Activity
          plugin_activity: no
          
          # Other plugins
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_stars: yes
          plugin_stars_limit: 4
          
          committer_token: ${{ secrets.GITHUB_TOKEN }}
